name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  schedule:
    - cron: '0 6 * * 1'

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        coq_version: ['9.0', '9.1', '9.2', 'dev']

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: rocq-prover/docker-opam-action@master
        with:
          coq_version: ${{ matrix.coq_version }}
          before_install: |
            startGroup "Fix workspace permissions"
              sudo chown -R $(id -u):$(id -g) .
              git config --global --add safe.directory /github/workspace
            endGroup
            startGroup "Print opam config"
              opam config list; opam repo list; opam list
            endGroup
          script: |
            startGroup "Build"
              opam exec -- dune build
            endGroup
            startGroup "Install"
              opam exec -- dune install
            endGroup
          uninstall: ''

  check-all:
    runs-on: ubuntu-latest
    needs: build
    if: always()
    steps:
    - run: echo 'All builds passed'
      if: ${{ needs.build.result == 'success' }}
    - run: echo 'Some builds failed' && false
      if: ${{ needs.build.result != 'success' }}
